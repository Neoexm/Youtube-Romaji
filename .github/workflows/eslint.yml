name: ESLint

on:
  push:
    branches: [main]
    paths:
      - '**.js'
      - '**.py'
      - 'eslint.config.js'
      - 'package.json'
      - 'server/package.json'
      - 'server/python/**'
      - '.github/workflows/eslint.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.js'
      - '**.py'
      - 'eslint.config.js'
      - 'package.json'
      - 'server/package.json'
      - 'server/python/**'
      - '.github/workflows/eslint.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: npm ci

    - name: Install server dependencies
      working-directory: ./server
      run: npm ci
    
    - name: Lint repository code
      run: npm run lint

    - name: Run tests
      run: npm test
